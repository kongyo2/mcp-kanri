appId: app.kongyo2.mcp-kanri
productName: MCP管理
directories:
  output: release
  buildResources: build
files:
  - 'out/**/*'
  - 'package.json'
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDir: true
  perMachine: false
  artifactName: MCP-Kanri-Setup-${version}.${ext}
publish: null
